<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookshelf — Ayyuce Demirbas</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ayyucedemirbas/ayyucedemirbas.github.io/refs/heads/main/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <!-- PapaParse library for parsing CSV files -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    /* ── VARIABLES ── */
    :root {
      --gradient-1: linear-gradient(45deg, #ff6b6b, #4ecdc4);
      --gradient-2: linear-gradient(45deg, #bb86fc, #03dac6);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      --bg-dark: #121212;
      --text-dark: #f0f0f0;
      --accent-dark: #bb86fc;
      --bg: var(--bg-dark);
      --text: var(--text-dark);
      --accent: var(--accent-dark);
      --transition-speed: 0.3s;

      /* Book cover/spine patterns */
      --argyle: repeating-linear-gradient(
          120deg,
          rgba(255,255,255,0.1),
          rgba(255,255,255,0.1) 1px,
          transparent 1px,
          transparent 60px
        ),
        repeating-linear-gradient(
          60deg,
          rgba(255,255,255,0.1),
          rgba(255,255,255,0.1) 1px,
          transparent 1px,
          transparent 60px
        ),
        linear-gradient(60deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%),
        linear-gradient(120deg, rgba(0,0,0,0.1) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.1) 75%);

      --tartan: repeating-linear-gradient(
          transparent, transparent 50px,
          rgba(0,0,0,0.4) 50px, rgba(0,0,0,0.4) 53px,
          transparent 53px, transparent 63px,
          rgba(0,0,0,0.4) 63px, rgba(0,0,0,0.4) 66px,
          transparent 66px, transparent 116px,
          rgba(0,0,0,0.5) 116px, rgba(0,0,0,0.5) 166px,
          rgba(255,255,255,0.2) 166px, rgba(255,255,255,0.2) 169px,
          rgba(0,0,0,0.5) 169px, rgba(0,0,0,0.5) 179px,
          rgba(255,255,255,0.2) 179px, rgba(255,255,255,0.2) 182px,
          rgba(0,0,0,0.5) 182px, rgba(0,0,0,0.5) 232px,
          transparent 232px
        ),
        repeating-linear-gradient(
          270deg,
          transparent, transparent 50px,
          rgba(0,0,0,0.4) 50px, rgba(0,0,0,0.4) 53px,
          transparent 53px, transparent 63px,
          rgba(0,0,0,0.4) 63px, rgba(0,0,0,0.4) 66px,
          transparent 66px, transparent 116px,
          rgba(0,0,0,0.5) 116px, rgba(0,0,0,0.5) 166px,
          rgba(255,255,255,0.2) 166px, rgba(255,255,255,0.2) 169px,
          rgba(0,0,0,0.5) 169px, rgba(0,0,0,0.5) 179px,
          rgba(255,255,255,0.2) 179px, rgba(255,255,255,0.2) 182px,
          rgba(0,0,0,0.5) 182px, rgba(0,0,0,0.5) 232px,
          transparent 232px
        ),
        repeating-linear-gradient(
          125deg,
          transparent, transparent 2px,
          rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 3px,
          transparent 3px, transparent 5px,
          rgba(0,0,0,0.2) 5px
        );
    }

    [data-theme="light"] {
      --bg: #fefefe;
      --text: #111111;
      --accent: #0077ff;
      --glass-bg: rgba(0,0,0,0.03);
      --shadow: 0 8px 32px 0 rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── BODY ── */
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      transition: background-color var(--transition-speed), color var(--transition-speed);
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; transition: color 0.2s; }

    /* ── NAVIGATION ── */
    nav {
      background-color: rgba(0,0,0,0.2);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 1000;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
    nav ul {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      margin: 0;
      padding: 1rem 0;
    }
    nav li { position: relative; }
    nav a {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.03rem;
      text-decoration: none;
      transition: all 0.3s ease;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    nav a:hover { background: rgba(255,255,255,0.05); }
    nav a[aria-current="page"] {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 4px 15px rgba(187,134,252,0.3);
    }
    nav a[aria-current="page"]:hover { background: var(--accent); opacity: 0.9; }

    @media (max-width: 768px) {
      nav ul { gap: 0.5rem; justify-content: flex-start; overflow-x: auto; }
      nav a { font-size: 0.95rem; padding: 0.6rem 1rem; }
    }

    /* ── PAGE HEADER ── */
    .page-header {
      max-width: 1100px;
      margin: 3rem auto 0;
      padding: 0 2rem;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .page-header p {
      color: var(--accent);
      font-size: 1.05rem;
      font-weight: 500;
    }
    .header-line {
      width: 60px;
      height: 3px;
      background: var(--accent);
      margin: 1rem 0 0;
      border-radius: 2px;
    }

    /* ── SHELF SECTION ── */
    .shelf-section {
      max-width: 1100px;
      margin: 3rem auto 0;
      padding: 0 2rem;
    }

    .shelf-year {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .shelf-year::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    [data-theme="light"] .shelf-year::after { background: rgba(0,0,0,0.1); }

    /* ── THE BOOKSHELF ── */
    .bookshelf {
      width: 100%;
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end; /* Aligns books to the bottom of the shelf */
      /* gap: row-gap column-gap */
      /* Increased row-gap to 30px so wrapped shelves don't touch tightly */
      gap: 30px 2px; 
      border-bottom: 3px solid var(--accent);
      padding-bottom: 2px;
      margin-bottom: 20px;
    }

    /* ── BOOK ── */
    .book {
      width: 40px; /* Reduced width */
      /* Note: Height is assigned dynamically via JS */
      position: relative;
      transform-style: preserve-3d;
      transform: translateZ(0) rotateY(0);
      transition: transform 0.6s ease;
      cursor: pointer;
    }

    .book:hover {
      z-index: 1;
      transform: rotateX(-25deg) rotateY(-40deg) rotateZ(-15deg)
                 translateY(50px) translateX(-30px);
    }

    /* ── SIDES ── */
    .side {
      position: absolute;
      border: 2px solid rgba(0,0,0,0.6);
      border-radius: 3px;
      font-weight: bold;
      color: black;
      text-align: center;
      transform-origin: center left;
    }

    .spine {
      position: absolute;
      width: 100%;
      height: 100%; /* Matches dynamic container height */
      background-image: var(--tartan);
      transform: rotateY(0deg) translateZ(0px);
    }

    .spine-title {
      margin: 6px;
      margin-bottom: 35px; /* Space for the author name */
      position: absolute;
      top: 0;
      left: 0;
      font-size: 13px; /* Reduced font size */
      color: white;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      font-family: 'Ubuntu', sans-serif;
      font-weight: bold;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      
      white-space: nowrap;
      
      /* Hard limit to gracefully hide text if it reaches the maximum allowed height cap */
      max-height: calc(100% - 40px);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spine-author {
      position: absolute;
      color: rgba(255,255,255,0.85);
      font-size: 9px; /* Reduced font size */
      bottom: 4px;
      text-align: center;
      right: 10%;
      font-family: 'Ubuntu', sans-serif;
      font-weight: normal;
      text-shadow: 0 1px 2px rgba(0,0,0,0.9);
    }

    .top {
      width: 40px; /* Reduced width */
      height: 150px; /* Reduced depth */
      top: 0; 
      background-image: linear-gradient(90deg, #e8e8e8 90%, #aaa 10%);
      background-size: 5px 5px;
      /* Adjusted translations based on new 150px depth (75px is half of 150) */
      transform: rotateX(90deg) translateZ(75px) translateY(-75px);
    }

    .cover {
      width: 150px; /* Reduced depth */
      height: 100%; /* Matches dynamic container height */
      top: 0;
      left: 40px; /* Aligns with new book width */
      background-image: var(--tartan);
      background-color: black;
      background-size: contain;
      background-repeat: round;
      transform: rotateY(90deg) translateZ(0);
      transition: transform 1s;
    }

    /* ── TOOLTIP on hover ── */
    .book-tooltip {
      position: absolute;
      bottom: calc(100% + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: rgba(18,18,18,0.95);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 0.5rem 0.8rem;
      border-radius: 8px;
      font-size: 0.78rem;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      font-family: 'Inter', sans-serif;
      max-width: 200px;
      white-space: normal;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    [data-theme="light"] .book-tooltip {
      background: rgba(255,255,255,0.97);
      color: #111;
    }
    .book-tooltip strong { display: block; color: var(--accent); margin-bottom: 2px; }
    .book:hover .book-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── CURRENTLY READING badge ── */
    .currently-reading-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: var(--bg);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .currently-reading-label .dot {
      width: 7px;
      height: 7px;
      background: var(--bg);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.8); }
    }

    /* ── STATS BAR ── */
    .stats-bar {
      max-width: 1100px;
      margin: 2.5rem auto 0;
      padding: 0 2rem;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      box-shadow: var(--shadow);
      transition: transform 0.2s, border-color 0.2s;
    }
    [data-theme="light"] .stat-card { border: 1px solid rgba(0,0,0,0.08); }
    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-card .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--accent);
      line-height: 1;
    }
    .stat-card .stat-label {
      font-size: 0.82rem;
      color: var(--text);
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── THEME SWITCHER ── */
    .theme-switcher {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.6rem;
      z-index: 100;
    }
    .theme-switcher button {
      background: none;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
    }
    .theme-switcher button:hover { background: var(--accent); color: var(--bg); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 3rem 0;
      margin-top: 5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.9rem;
      color: #888;
    }
    [data-theme="light"] footer { border-top: 1px solid rgba(0,0,0,0.1); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .page-header h1 { font-size: 2rem; }
      .book { width: 34px; }
      .spine { width: 34px; }
      .top { width: 34px; }
      .stats-bar { gap: 1rem; }
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <div class="nav-container">
      <ul>
        <li><a href="index.html">About</a></li>

        <li><a href="cats.html">🐾</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── PAGE HEADER ── -->
  <div class="page-header">
    <h1>My Bookshelf</h1>
    <p>A collection of books I've read.</p>
    <div class="header-line"></div>
  </div>

  <!-- ── STATS ── -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <span class="stat-number" id="totalCount">—</span>
      <span class="stat-label">Total Books Read</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="yearsCount">—</span>
      <span class="stat-label">Years covered</span>
    </div>
    <div class="stat-card">
      <span class="stat-number">30</span>
      <span class="stat-label">2026 reading goal</span>
    </div>
  </div>

  <!-- CONTAINER FOR DYNAMIC SHELVES -->
  <div id="dynamic-library-container"></div>

  <!-- ── THEME SWITCHER ── -->
  <div class="theme-switcher">
    <button onclick="switchTheme('light')"><i class="fas fa-sun"></i> Light</button>
    <button onclick="switchTheme('dark')"><i class="fas fa-moon"></i> Dark</button>
    <button onclick="switchTheme('system')"><i class="fas fa-desktop"></i> System</button>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <p>&copy; 2026 Ayyuce Demirbas. All Rights Reserved.</p>
  </footer>

  <script>
    /* ── THEME ── */
    function switchTheme(theme) {
      if (theme === 'system') {
        document.documentElement.removeAttribute('data-theme');
      } else {
        document.documentElement.setAttribute('data-theme', theme);
      }
      localStorage.setItem('preferred-theme', theme);
    }
    (function initTheme() {
      const saved = localStorage.getItem('preferred-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
    })();

    /* ── RANDOM BOOK STYLING ── */
    function getRandomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function randomChoice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    const availablePatterns = ['argyle', 'tartan'];
    const availableColours = [
      '#4a1a7a', '#1a3a6a', '#2d6a4f', '#6b2d2d', '#4a3728', 
      '#1a4a5a', '#5a3a1a', '#3a2a5a', '#2a4a2a', '#5a1a3a'
    ];

    function applyRandomStylesToBooks() {
      const books = Array.from(document.getElementsByClassName('book'));

      books.forEach(function (book) {
        const spine = book.querySelector('.spine');
        const cover = book.querySelector('.cover');
        const titleEl = book.querySelector('.spine-title');

        const charCount = titleEl.textContent.length;
        
        // Lower base height since everything is scaled down
        const minHeight = 200; 
        
        // Lower multiplier for character scaling
        const estimatedHeight = Math.max(minHeight, charCount * 6.5 + 70);

        // Cap maximum height accordingly 
        const finalHeight = Math.min(360, getRandomInt(estimatedHeight, estimatedHeight + 20));

        // Apply dynamic height directly to the main book container
        book.style.height = `${finalHeight}px`;

        // Apply random colors and patterns
        const randomPattern = randomChoice(availablePatterns);
        const randomColor   = randomChoice(availableColours);

        spine.style.backgroundImage = `var(--${randomPattern})`;
        spine.style.backgroundColor = randomColor;

        if(cover) {
            cover.style.backgroundColor = randomColor;
            cover.style.backgroundImage = `var(--${randomPattern})`;
        }
      });
    }

    /* ── CSV PARSING AND RENDERING ── */
    document.addEventListener('DOMContentLoaded', function () {
      
      // Book HTML template generator
      function createBookHTML(title, author) {
        return `
          <div class="book">
            <div class="side spine">
              <span class="spine-title">${title}</span>
              <span class="spine-author">${author}</span>
            </div>
            <div class="side top"></div>
            <div class="side cover"></div>
            <div class="book-tooltip">
              <strong>${title}</strong>
              ${author}
            </div>
          </div>
        `;
      }

      // Read and process CSV with PapaParse
      Papa.parse("goodreads_library_export.csv", {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
          const data = results.data;
          let currentlyReading = [];
          let booksByYear = {};
          
          let totalReadBooks = 0; // Tracks all read books regardless of the year

          data.forEach(row => {
            const title = row["Title"];
            const author = row["Author"];
            const shelf = row["Exclusive Shelf"];
            let dateRead = row["Date Read"];

            if (!title || !author) return;

            if (shelf === "currently-reading") {
              currentlyReading.push({ title, author });
            } else if (shelf === "read") {
              totalReadBooks++; // Count every read book for the statistics

              // Parse year
              let year = null;
              if (dateRead) {
                const parsedDate = new Date(dateRead);
                if (!isNaN(parsedDate.getFullYear())) {
                  year = parsedDate.getFullYear();
                }
              }
              
              // Only process and render if the year was parsed successfully and is >= 2014
              if (year !== null && year >= 2014) {
                if (!booksByYear[year]) {
                  booksByYear[year] = [];
                }
                booksByYear[year].push({ title, author });
              }
            }
          });

          // HTML generation part
          const container = document.getElementById('dynamic-library-container');
          let htmlContent = "";

          // Currently Reading Shelf
          if (currentlyReading.length > 0) {
            htmlContent += `
              <div class="shelf-section">
                <div class="shelf-year">
                  <span class="currently-reading-label">
                    <span class="dot"></span>
                    Currently Reading
                  </span>
                </div>
                <div class="bookshelf">
                  ${currentlyReading.map(book => createBookHTML(book.title, book.author)).join('')}
                </div>
              </div>
            `;
          }

          // Read Books Shelf by Year (Descending Order)
          const years = Object.keys(booksByYear).sort((a, b) => b - a);
          years.forEach(year => {
            htmlContent += `
              <div class="shelf-section">
                <div class="shelf-year">${year}</div>
                <div class="bookshelf">
                  ${booksByYear[year].map(book => createBookHTML(book.title, book.author)).join('')}
                </div>
              </div>
            `;
          });

          // Append to the DOM
          container.innerHTML = htmlContent;

          // Update Statistics using the totalReadBooks variable 
          document.getElementById('totalCount').textContent = totalReadBooks;
          document.getElementById('yearsCount').textContent = years.length;

          // Apply dynamic sizing and random styles after books are rendered
          setTimeout(applyRandomStylesToBooks, 50);
        },
        error: function(error) {
          console.error("Error reading CSV:", error);
          document.getElementById('dynamic-library-container').innerHTML = `<p style="text-align:center; color: var(--accent); margin-top: 2rem;">Error loading library data. Ensure 'goodreads_library_export.csv' is present in the same directory.</p>`;
        }
      });
    });
  </script>
</body>
