<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intel 4004 Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --green:      #00ff41;
  --green-dim:  #00b32c;
  --green-dark: #003b10;
  --green-faint:#001a08;
  --amber:      #ffb000;
  --red:        #ff4444;
  --bg:         #080808;
  --panel:      #0d0d0d;
  --border:     #1a401a;
  --glow:       0 0 8px #00ff41, 0 0 20px rgba(0,255,65,.25);
  --font-mono:  'Share Tech Mono', monospace;
  --font-crt:   'VT323', monospace;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  background:var(--bg);
  color:var(--green);
  font-family:var(--font-mono);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.75) 100%);
}

.wrap{max-width:1280px;margin:0 auto;padding:16px 20px 24px}


header{text-align:center;padding:18px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px}
header h1{
  font-family:var(--font-crt);font-size:3rem;letter-spacing:6px;
  color:var(--green);text-shadow:var(--glow);
}
header p{font-size:.68rem;color:var(--green-dim);letter-spacing:3px;margin-top:2px}


.grid{display:grid;grid-template-columns:210px 1fr 270px;gap:14px;align-items:start}


.panel{
  background:var(--panel);border:1px solid var(--border);
  padding:12px 10px;position:relative;
}
.panel[data-lbl]::before{
  content:attr(data-lbl);position:absolute;top:-9px;left:10px;
  background:var(--bg);padding:0 6px;
  font-size:.58rem;color:var(--green-dim);letter-spacing:2px;
}


.sec{
  font-size:.58rem;color:var(--green-dim);letter-spacing:2px;
  text-transform:uppercase;margin:8px 0 4px;
  border-top:1px solid #0f200f;padding-top:6px;
}
.sec:first-child{border-top:none;margin-top:0;padding-top:0}

.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 0;border-bottom:1px solid #0d180d;font-size:.75rem;
}
.rname{color:var(--green-dim);font-size:.65rem;letter-spacing:1px;min-width:38px}
.rval{
  font-family:var(--font-crt);font-size:1.1rem;color:var(--green);
  text-shadow:0 0 6px rgba(0,255,65,.4);min-width:30px;text-align:right;
}
.rbits{font-size:.6rem;color:#004818;letter-spacing:1px}
.rval.changed{
  color:var(--amber);text-shadow:0 0 8px rgba(255,176,0,.6);
  animation:flash .5s ease-out;
}
@keyframes flash{0%{background:rgba(255,176,0,.25)}100%{background:transparent}}

.flags{display:flex;gap:10px;margin:4px 0 2px}
.flag{display:flex;align-items:center;gap:5px;font-size:.72rem}
.led{width:9px;height:9px;border-radius:50%;background:#001e08;border:1px solid #003010}
.led.on{background:var(--green);box-shadow:0 0 7px var(--green)}
.led.am.on{background:var(--amber);box-shadow:0 0 7px var(--amber)}
.led.rd.on{background:var(--red);box-shadow:0 0 7px var(--red)}

.reg2{display:grid;grid-template-columns:1fr 1fr;gap:2px}

.stk{display:flex;gap:6px;margin:2px 0}
.stk-item{
  font-family:var(--font-crt);font-size:.85rem;
  padding:1px 5px;border:1px solid var(--border);
  color:var(--green-dim);min-width:40px;text-align:center;
}

.tick{display:flex;justify-content:space-between;font-size:.6rem;color:var(--green-dim);margin-top:6px}


.editor-col{display:flex;flex-direction:column;gap:8px}

.toolbar{display:flex;gap:6px;align-items:center}

select{
  background:var(--green-faint);border:1px solid var(--border);
  color:var(--green);font-family:var(--font-mono);font-size:.7rem;
  padding:4px 8px;outline:none;cursor:pointer;flex:1;
}
select option{background:#0a0a0a}

.code-wrap{position:relative}
.lnums{
  position:absolute;left:0;top:0;width:30px;
  padding:7px 4px;font-family:var(--font-mono);font-size:.73rem;
  color:#004020;line-height:1.55;text-align:right;
  pointer-events:none;user-select:none;
}

#code{
  width:100%;height:330px;
  background:var(--green-faint);border:1px solid var(--border);
  color:var(--green);font-family:var(--font-mono);font-size:.73rem;
  line-height:1.55;padding:7px 7px 7px 36px;
  resize:vertical;outline:none;caret-color:var(--green);
}
#code:focus{border-color:var(--green-dim);box-shadow:0 0 10px rgba(0,255,65,.08)}

.curr-line{
  display:flex;align-items:center;gap:7px;
  font-size:.72rem;color:var(--amber);min-height:20px;
}
.blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}

.btns{display:flex;gap:6px;flex-wrap:wrap}

button{
  font-family:var(--font-mono);font-size:.7rem;
  padding:5px 13px;border:1px solid;cursor:pointer;
  letter-spacing:1px;text-transform:uppercase;
  transition:all .15s;background:transparent;
}
.bp{border-color:var(--green);color:var(--green)}
.bp:hover{background:var(--green);color:var(--bg);box-shadow:var(--glow)}
.bs{border-color:var(--green-dim);color:var(--green-dim)}
.bs:hover{border-color:var(--green);color:var(--green)}
.ba{border-color:var(--amber);color:var(--amber)}
.ba:hover{background:var(--amber);color:var(--bg)}
.bd{border-color:var(--red);color:var(--red)}
.bd:hover{background:var(--red);color:var(--bg)}
button:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

.speed-row{display:flex;align-items:center;gap:7px;font-size:.65rem;color:var(--green-dim)}
input[type=range]{
  -webkit-appearance:none;height:2px;background:var(--border);outline:none;flex:1;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;
  background:var(--green);cursor:pointer;border-radius:0;
}


.right-col{display:flex;flex-direction:column;gap:12px}

#log{
  height:170px;overflow-y:auto;font-size:.68rem;line-height:1.65;
  padding:4px;background:var(--green-faint);border:1px solid var(--border);
}
.le{padding:1px 0;border-bottom:1px solid #001508}
.le-x{color:var(--green)}
.le-i{color:var(--green-dim)}
.le-w{color:var(--amber)}
.le-e{color:var(--red)}

.mem-grid{
  display:grid;grid-template-columns:repeat(8,1fr);gap:2px;
  font-family:var(--font-crt);
}
.mc{
  text-align:center;padding:2px 1px;border:1px solid #001508;
  color:#003a18;font-size:.78rem;transition:color .2s,border-color .2s;
}
.mc.hi{color:var(--green);border-color:var(--green-dim);background:#001a08}

.ref{font-size:.62rem;color:#003518}
.ref > div{padding:1px 0;border-bottom:1px solid #001208}
.ref span{color:var(--green-dim);margin-right:5px}


@media(max-width:960px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>▌ INTEL 4004 SIMULATOR ▐</h1>
  <p>WORLD'S FIRST COMMERCIAL MICROPROCESSOR  ·  4-BIT  ·  740 kHz  ·  INTEL 1971</p>
</header>

<div class="grid">

  <div class="panel" data-lbl="CPU STATE">

    <div class="sec" style="border-top:none;margin-top:0;padding-top:0">ACCUMULATOR</div>
    <div class="row">
      <span class="rname">ACC</span>
      <span class="rbits" id="acc-bits">0000</span>
      <span class="rval" id="acc-val">0</span>
    </div>

    <div class="sec">FLAGS</div>
    <div class="flags">
      <div class="flag"><div class="led" id="led-cy"></div><span>CY</span></div>
      <div class="flag"><div class="led" id="led-zr"></div><span>ZR</span></div>
      <div class="flag"><div class="led am" id="led-ht"></div><span>HLT</span></div>
    </div>

    <div class="sec">PROGRAM COUNTER</div>
    <div class="row">
      <span class="rname">PC</span>
      <span class="rbits" id="pc-bits" style="font-size:.55rem;letter-spacing:0">000000000000</span>
      <span class="rval" id="pc-val">000</span>
    </div>

    <div class="sec">STACK (3 DEEP)</div>
    <div class="stk">
      <div class="stk-item" id="stk0">---</div>
      <div class="stk-item" id="stk1">---</div>
      <div class="stk-item" id="stk2">---</div>
    </div>

    <div class="sec">REGISTERS R0–R15</div>
    <div class="reg2" id="regs"></div>

    <div class="tick">
      <span>CYCLES: <span id="cyc">0</span></span>
      <span id="clk">◼</span>
    </div>
  </div>

  <div class="editor-col">
    <div class="panel" data-lbl="PROGRAM EDITOR" style="flex:1">

      <div class="toolbar" style="margin-bottom:7px">
        <select id="ex-sel">
          <option value="">— LOAD EXAMPLE PROGRAM —</option>
          <option value="add">Addition  (5 + 3)</option>
          <option value="sub">Subtraction  (9 − 4)</option>
          <option value="mul">Multiplication  (3 × 4)</option>
          <option value="div">Division  (12 ÷ 3)</option>
          <option value="bitops">Bitwise AND / OR / XOR</option>
          <option value="shift">Bit Shifting (SHL/SHR/RAL/RAR)</option>
          <option value="nand">NAND / XAND Gate</option>
          <option value="loop">Loop Counter</option>
          <option value="fib">Fibonacci Sequence</option>
        </select>
      </div>

      <div class="code-wrap">
        <div class="lnums" id="lnums">1<br></div>
        <textarea id="code" spellcheck="false">; Intel 4004 Simulator — Example: 5 + 3
; ─────────────────────────────────────
START:
    CLB         ; Clear ACC and carry
    LDM 5       ; Load immediate 5 → ACC
    XCH R0      ; Swap ACC ↔ R0  (R0=5, ACC=0)
    LDM 3       ; Load immediate 3 → ACC
    ADD R0      ; ACC = ACC + R0 + CY  (3+5=8)
    XCH R1      ; Store result in R1
    WRM 0       ; Write ACC to memory[0]
    HLT         ; Halt processor</textarea>
      </div>

      <div class="curr-line" style="margin-top:5px">
        <span style="color:var(--amber)">▶</span>
        <span id="curr-txt">READY</span>
        <span class="blink">_</span>
      </div>

      <div class="btns" style="margin-top:6px">
        <button class="bp"  id="btn-load" onclick="loadProg()">LOAD</button>
        <button class="bp"  id="btn-step" onclick="stepCPU()" disabled>STEP</button>
        <button class="ba"  id="btn-run"  onclick="runCPU()"  disabled>RUN</button>
        <button class="bs"  id="btn-stop" onclick="stopCPU()" disabled>STOP</button>
        <button class="bd"  id="btn-rst"  onclick="resetAll()">RESET</button>
      </div>

      <div class="speed-row" style="margin-top:6px">
        <span>SLOW</span>
        <input type="range" id="spd" min="1" max="10" value="4">
        <span>FAST</span>
        <span id="spd-lbl" style="min-width:55px;text-align:right">10 Hz</span>
      </div>
    </div>
  </div>

  <div class="right-col">

    <div class="panel" data-lbl="EXECUTION LOG">
      <div id="log"></div>
      <button class="bs" style="font-size:.6rem;padding:2px 7px;margin-top:5px" onclick="clearLog()">CLEAR</button>
    </div>

    <div class="panel" data-lbl="DATA MEMORY  addr[0..31]">
      <div class="mem-grid" id="mem-grid"></div>
      <div style="font-size:.57rem;color:#003018;margin-top:5px">4-BIT WORDS · DECIMAL · 32 LOCATIONS</div>
    </div>

    <div class="panel" data-lbl="INSTRUCTION REFERENCE">
      <div class="ref" id="ref-table"></div>
    </div>

  </div>
</div><!-- /grid -->
</div><!-- /wrap -->

<script>

const CPU = {
  acc:0, cy:0, pc:0,
  stack:[0,0,0], sp:0,
  regs:new Array(16).fill(0),
  mem:new Array(32).fill(0),
  halted:false, cycles:0,
};

let prog=[], lbls={}, running=false, runTmr=null, prev=null;

function parseReg(s){
  if(!s)return null;
  const m=s.trim().toUpperCase().match(/^R(\d+)$/);
  if(m){const n=+m[1]; if(n>=0&&n<=15)return n;}
  return null;
}
function parseImm(s){
  if(s===undefined||s===null)return null;
  s=s.trim();
  if(/^0[xX]/.test(s))return parseInt(s,16);
  if(/^0[bB]/.test(s))return parseInt(s.slice(2),2);
  return parseInt(s,10);
}

function assemble(src){
  prog=[];lbls={};
  const lines=src.split('\n');
  let idx=0;

  for(let i=0;i<lines.length;i++){
    let l=lines[i].replace(/;.*$/,'').trim();
    if(!l)continue;
    if(l.endsWith(':')){lbls[l.slice(0,-1).toUpperCase()]=idx;continue;}
    const m=l.match(/^([A-Za-z_][A-Za-z0-9_]*):\s+(.+)$/);
    if(m){lbls[m[1].toUpperCase()]=idx;idx++;continue;}
    idx++;
  }

  idx=0;
  for(let i=0;i<lines.length;i++){
    let raw=lines[i], l=raw.replace(/;.*$/,'').trim();
    if(!l)continue;
    if(l.endsWith(':'))continue;
    const m=l.match(/^([A-Za-z_][A-Za-z0-9_]*):\s+(.+)$/);
    if(m)l=m[2];
    const tok=l.split(/[\s,]+/).filter(Boolean);
    prog.push({op:tok[0].toUpperCase(),args:tok.slice(1).map(t=>t.toUpperCase()),ln:i+1,raw:raw.trim()});
    idx++;
  }
}


function step(){
  if(CPU.halted||CPU.pc>=prog.length){
    CPU.halted=true;halt();return false;
  }
  const{op,args,ln,raw}=prog[CPU.pc];
  CPU.pc++; CPU.cycles++;
  prev={acc:CPU.acc,cy:CPU.cy,regs:[...CPU.regs]};

  const g=r=>(CPU.regs[r]&0xF);
  const s=(r,v)=>{CPU.regs[r]=v&0xF;};
  const c=v=>v&0xF;

  switch(op){
    case 'NOP':break;

    case 'HLT':
      CPU.halted=true;CPU.pc--;
      log(`HLT  ACC=${CPU.acc}  CY=${CPU.cy}`,'le-w');
      updateUI();halt();return false;

    case 'LDM':{const n=parseImm(args[0]);if(n===null||isNaN(n)){err(`LDM: bad imm '${args[0]}'`);break;}CPU.acc=c(n);log(`LDM ${n&0xF}  →  ACC=${CPU.acc}`);break;}

    case 'LD':{const r=parseReg(args[0]);if(r===null){err(`LD: bad reg`);break;}CPU.acc=g(r);log(`LD R${r}  →  ACC=${CPU.acc}`);break;}

    case 'XCH':{const r=parseReg(args[0]);if(r===null){err(`XCH: bad reg`);break;}const t=CPU.acc;CPU.acc=g(r);s(r,t);log(`XCH R${r}  →  ACC=${CPU.acc}  R${r}=${CPU.regs[r]}`);break;}

    case 'ADD':{const r=parseReg(args[0]);if(r===null){err(`ADD: bad reg`);break;}const sum=CPU.acc+g(r)+CPU.cy;CPU.cy=sum>15?1:0;CPU.acc=c(sum);log(`ADD R${r}: ${prev.acc}+${g(r)}+${prev.cy}  →  ACC=${CPU.acc}  CY=${CPU.cy}`);break;}

    case 'SUB':{const r=parseReg(args[0]);if(r===null){err(`SUB: bad reg`);break;}const d=CPU.acc-g(r);CPU.cy=d<0?1:0;CPU.acc=c(d);log(`SUB R${r}: ${prev.acc}-${g(r)}  →  ACC=${CPU.acc}  CY(borrow)=${CPU.cy}`);break;}

    case 'INC':{const r=parseReg(args[0]);if(r===null){err(`INC: bad reg`);break;}s(r,g(r)+1);log(`INC R${r}  →  R${r}=${CPU.regs[r]}`);break;}

    case 'IAC':{const sum=CPU.acc+1;CPU.cy=sum>15?1:0;CPU.acc=c(sum);log(`IAC  →  ACC=${CPU.acc}  CY=${CPU.cy}`);break;}

    case 'DAC':{const d=CPU.acc-1;CPU.cy=d<0?1:0;CPU.acc=c(d);log(`DAC  →  ACC=${CPU.acc}  CY=${CPU.cy}`);break;}

    case 'CLC':CPU.cy=0;log(`CLC  →  CY=0`);break;
    case 'STC':CPU.cy=1;log(`STC  →  CY=1`);break;
    case 'CMC':CPU.cy^=1;log(`CMC  →  CY=${CPU.cy}`);break;
    case 'CMA':CPU.acc=(~CPU.acc)&0xF;log(`CMA  →  ACC=${CPU.acc}  (${b4(CPU.acc)})`);break;
    case 'CLB':CPU.acc=0;CPU.cy=0;log(`CLB  →  ACC=0  CY=0`);break;
    case 'TCC':CPU.acc=CPU.cy;CPU.cy=0;log(`TCC  →  ACC=${CPU.acc}  CY=0`);break;

    case 'RAL':{const msb=(CPU.acc>>3)&1;CPU.acc=((CPU.acc<<1)|CPU.cy)&0xF;CPU.cy=msb;log(`RAL  →  ACC=${b4(CPU.acc)}  CY=${CPU.cy}`);break;}
    case 'RAR':{const lsb=CPU.acc&1;CPU.acc=((CPU.acc>>1)|(CPU.cy<<3))&0xF;CPU.cy=lsb;log(`RAR  →  ACC=${b4(CPU.acc)}  CY=${CPU.cy}`);break;}

    case 'SHL':{CPU.cy=(CPU.acc>>3)&1;CPU.acc=(CPU.acc<<1)&0xF;log(`SHL  →  ACC=${b4(CPU.acc)}=${CPU.acc}  CY=${CPU.cy}`);break;}
    case 'SHR':{CPU.cy=CPU.acc&1;CPU.acc=(CPU.acc>>1)&0xF;log(`SHR  →  ACC=${b4(CPU.acc)}=${CPU.acc}  CY=${CPU.cy}`);break;}

    case 'AND':{const r=parseReg(args[0]);if(r===null){err(`AND: bad reg`);break;}CPU.acc=(CPU.acc&g(r))&0xF;log(`AND R${r}: ${b4(prev.acc)} & ${b4(g(r))}  →  ACC=${b4(CPU.acc)}=${CPU.acc}`);break;}
    case 'OR': {const r=parseReg(args[0]);if(r===null){err(`OR: bad reg`);break;} CPU.acc=(CPU.acc|g(r))&0xF;log(`OR  R${r}: ${b4(prev.acc)} | ${b4(g(r))}  →  ACC=${b4(CPU.acc)}=${CPU.acc}`);break;}
    case 'XOR':{const r=parseReg(args[0]);if(r===null){err(`XOR: bad reg`);break;}CPU.acc=(CPU.acc^g(r))&0xF;log(`XOR R${r}: ${b4(prev.acc)} ^ ${b4(g(r))}  →  ACC=${b4(CPU.acc)}=${CPU.acc}`);break;}
    case 'XAND':{const r=parseReg(args[0]);if(r===null){err(`XAND: bad reg`);break;}CPU.acc=(~(CPU.acc&g(r)))&0xF;log(`XAND/NAND R${r}: ~(${b4(prev.acc)}&${b4(g(r))})  →  ACC=${b4(CPU.acc)}=${CPU.acc}`);break;}

    case 'MUL':{
      const r=parseReg(args[0]);if(r===null){err(`MUL: bad reg`);break;}
      const p=(CPU.acc*g(r))&0xFF;
      CPU.cy=p>15?1:0;CPU.acc=p&0xF;CPU.regs[15]=(p>>4)&0xF;
      log(`MUL R${r}: ${prev.acc}×${g(r)}=${p}  →  ACC=${CPU.acc}  R15(hi)=${CPU.regs[15]}  CY=${CPU.cy}`);break;
    }
    case 'DIV':{
      const r=parseReg(args[0]);if(r===null){err(`DIV: bad reg`);break;}
      if(g(r)===0){err('DIV: divide by zero');CPU.halted=true;halt();break;}
      const q=Math.floor(CPU.acc/g(r)),rem=CPU.acc%g(r);
      CPU.acc=q&0xF;CPU.regs[14]=rem&0xF;CPU.cy=0;
      log(`DIV R${r}: ${prev.acc}÷${g(r)}=${q} rem ${rem}  →  ACC=${CPU.acc}  R14(rem)=${CPU.regs[14]}`);break;
    }

    case 'JUN':{const l=args[0];if(!l||!(l in lbls)){err(`JUN: unknown label '${l}'`);break;}CPU.pc=lbls[l];log(`JUN ${l}  →  PC=${CPU.pc}`);break;}

    case 'JMS':{
      const l=args[0];if(!l||!(l in lbls)){err(`JMS: unknown label '${l}'`);break;}
      CPU.stack[CPU.sp%3]=CPU.pc;CPU.sp++;CPU.pc=lbls[l];
      log(`JMS ${l}  →  PC=${CPU.pc}`);break;
    }
    case 'BBL':{
      const n=args[0]!==undefined?parseImm(args[0]):0;
      CPU.sp=Math.max(0,CPU.sp-1);CPU.pc=CPU.stack[CPU.sp%3];
      CPU.acc=(n||0)&0xF;log(`BBL ${n||0}  →  ret PC=${CPU.pc}  ACC=${CPU.acc}`);break;
    }

    case 'JCN':{
      if(args.length<2){err('JCN: needs 2 args');break;}
      const cond=parseInt(args[0]),lbl=args[1];
      if(!(lbl in lbls)){err(`JCN: unknown label '${lbl}'`);break;}
      const zr=CPU.acc===0?1:0;
      let jmp=false;
      if(cond===1&&zr)jmp=true;
      else if(cond===2&&!zr)jmp=true;
      else if(cond===3&&CPU.cy)jmp=true;
      else if(cond===4&&!CPU.cy)jmp=true;
      if(jmp)CPU.pc=lbls[lbl];
      log(`JCN ${cond},${lbl}  →  ${jmp?'JUMP':'NO JUMP'}  PC=${CPU.pc}`);break;
    }
    case 'JCC':{const l=args[0];if(!(l in lbls)){err(`JCC: unknown label`);break;}if(!CPU.cy)CPU.pc=lbls[l];log(`JCC ${l}  →  ${!CPU.cy?'JUMP':'NO JUMP'}`);break;}
    case 'JCS':{const l=args[0];if(!(l in lbls)){err(`JCS: unknown label`);break;}if(CPU.cy)CPU.pc=lbls[l];log(`JCS ${l}  →  ${CPU.cy?'JUMP':'NO JUMP'}`);break;}

    case 'ISZ':{
      if(args.length<2){err('ISZ: needs reg+label');break;}
      const r=parseReg(args[0]),lbl=args[1];
      if(r===null){err(`ISZ: bad reg`);break;}
      if(!(lbl in lbls)){err(`ISZ: unknown label`);break;}
      s(r,g(r)+1);
      if(g(r)!==0)CPU.pc=lbls[lbl];
      log(`ISZ R${r},${lbl}  →  R${r}=${CPU.regs[r]}  ${g(r)!==0?'JUMP':'SKIP'}`);break;
    }

    case 'WRM':{
      const a=args[0]!==undefined?parseImm(args[0]):0;
      if(a<0||a>31){err('WRM: addr out of range');break;}
      CPU.mem[a]=CPU.acc;log(`WRM [${a}] ← ACC=${CPU.acc}`);break;
    }
    case 'RDM':{
      const a=args[0]!==undefined?parseImm(args[0]):0;
      if(a<0||a>31){err('RDM: addr out of range');break;}
      CPU.acc=CPU.mem[a]&0xF;log(`RDM [${a}] → ACC=${CPU.acc}`);break;
    }

    case 'DAA':{
      if(CPU.acc>9||CPU.cy){const r=CPU.acc+6;CPU.cy=r>15?1:0;CPU.acc=r&0xF;}
      log(`DAA  →  ACC=${CPU.acc}  CY=${CPU.cy}`);break;
    }

    default:err(`Unknown op: '${op}' (line ${ln})`);break;
  }

  updateUI();
  if(CPU.cycles>200000){stopCPU();log('CYCLE LIMIT 200k — stopped','le-w');return false;}
  return!CPU.halted;
}

/* ── UI ── */
const b4=n=>(n&0xF).toString(2).padStart(4,'0');
const hx=(n,d)=>n.toString(16).toUpperCase().padStart(d,'0');

function updateUI(){
  // ACC
  const av=document.getElementById('acc-val'),ab=document.getElementById('acc-bits');
  av.textContent=String(CPU.acc).padStart(2,' ');
  ab.textContent=b4(CPU.acc);
  if(prev&&prev.acc!==CPU.acc){av.classList.add('changed');setTimeout(()=>av.classList.remove('changed'),500);}

  // PC
  document.getElementById('pc-val').textContent=hx(CPU.pc,3);
  document.getElementById('pc-bits').textContent=CPU.pc.toString(2).padStart(12,'0');


  for(let i=0;i<16;i++){
    const el=document.getElementById(`rv${i}`);
    if(!el)continue;
    el.textContent=CPU.regs[i];
    if(prev&&prev.regs[i]!==CPU.regs[i]){el.classList.add('changed');setTimeout(()=>el.classList.remove('changed'),500);}
  }


  setLed('led-cy',CPU.cy);
  setLed('led-zr',CPU.acc===0);
  setLed('led-ht',CPU.halted,'am');

  // Stack
  for(let i=0;i<3;i++)document.getElementById(`stk${i}`).textContent=hx(CPU.stack[i],3);

  // Memory
  for(let i=0;i<32;i++){
    const el=document.getElementById(`mc${i}`);
    if(el){el.textContent=CPU.mem[i];el.className='mc'+(CPU.mem[i]?'  hi':'');}
  }

  // Current instruction
  const ct=document.getElementById('curr-txt');
  if(CPU.pc<prog.length){
    const ins=prog[CPU.pc];
    ct.textContent=`LINE ${ins.ln}: ${ins.raw.slice(0,50)}`;
  }else{ct.textContent=CPU.halted?'[ HALTED ]':'[ END OF PROGRAM ]';}

  document.getElementById('cyc').textContent=CPU.cycles;
  document.getElementById('clk').textContent=CPU.cycles%2?'◻':'◼';
}

function setLed(id,on,cls=''){
  const el=document.getElementById(id);
  if(!el)return;
  el.className='led'+(cls?' '+cls:'')+(on?' on':'');
}


function loadProg(){
  assemble(document.getElementById('code').value);
  resetState();
  if(!prog.length){log('No instructions found','le-w');return;}
  log(`Assembled ${prog.length} instruction(s). Labels: ${Object.keys(lbls).join(', ')||'none'}`, 'le-i');
  setButtons(true,false,false,false);
  updateUI();
}

function stepCPU(){if(CPU.halted){log('Halted. Reset to continue.','le-w');return;}step();}

function runCPU(){
  if(CPU.halted){log('Halted. Reset to continue.','le-w');return;}
  running=true;
  setButtons(false,false,true,false);
  const hz=getHz();
  runTmr=setInterval(()=>{
    const ok=step();
    if(!ok){clearInterval(runTmr);running=false;setButtons(true,true,false,false);}
  },Math.max(8,Math.floor(1000/hz)));
}

function stopCPU(){
  if(runTmr)clearInterval(runTmr);
  running=false;
  if(prog.length)setButtons(true,true,false,false);
}

function halt(){
  stopCPU();
  updateUI();
}

function resetAll(){
  stopCPU();resetState();prog=[];lbls=[];
  setButtons(false,false,false,false);
  document.getElementById('curr-txt').textContent='READY';
  log('CPU RESET','le-i');updateUI();
}

function resetState(){
  CPU.acc=0;CPU.cy=0;CPU.pc=0;
  CPU.stack=[0,0,0];CPU.sp=0;
  CPU.regs.fill(0);CPU.mem.fill(0);
  CPU.halted=false;CPU.cycles=0;
}

function setButtons(step,run,stop,rst){
  // step=can step, run=can run, stop=can stop
  document.getElementById('btn-step').disabled=!step;
  document.getElementById('btn-run').disabled=!run;
  document.getElementById('btn-stop').disabled=!stop;
}

function getHz(){
  const v=parseInt(document.getElementById('spd').value);
  return [1,2,5,10,20,50,100,200,500,1000][v-1]||20;
}

function log(msg,cls='le-x'){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='le '+cls;
  d.textContent=`[${String(CPU.cycles).padStart(5,'0')}] ${msg}`;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  while(el.children.length>300)el.removeChild(el.firstChild);
}
function err(msg){log('ERR: '+msg,'le-e');}
function clearLog(){document.getElementById('log').innerHTML='';}

document.getElementById('spd').addEventListener('input',function(){
  const hz=getHz();
  const lbl=hz>=1000?`${hz/1000} kHz`:`${hz} Hz`;
  document.getElementById('spd-lbl').textContent=lbl;
  if(running){clearInterval(runTmr);
    runTmr=setInterval(()=>{if(!step()){clearInterval(runTmr);running=false;setButtons(true,true,false,false);}},
      Math.max(8,Math.floor(1000/hz)));
  }
});

function updLnums(){
  const n=document.getElementById('code').value.split('\n').length;
  document.getElementById('lnums').innerHTML=Array.from({length:n},(_,i)=>i+1).join('<br>');
}
document.getElementById('code').addEventListener('input',updLnums);
document.getElementById('code').addEventListener('keydown',function(e){
  if(e.key==='Tab'){e.preventDefault();
    const s=this.selectionStart,en=this.selectionEnd;
    this.value=this.value.substring(0,s)+'    '+this.value.substring(en);
    this.selectionStart=this.selectionEnd=s+4;updLnums();
  }
});

const EX={
add:`; ─────────────────────────────────────
; ADDITION:  5 + 3 = 8
; Result stored in R1 and memory[0]
; ─────────────────────────────────────
START:
    CLB         ; Clear ACC and carry flag
    LDM 5       ; ACC = 5
    XCH R0      ; R0 = 5, ACC = 0
    LDM 3       ; ACC = 3
    ADD R0      ; ACC = 3 + 5 + CY = 8
    XCH R1      ; R1 = 8 (result)
    WRM 0       ; memory[0] = 8
    HLT`,

sub:`; ─────────────────────────────────────
; SUBTRACTION:  9 - 4 = 5
; Result stored in R1 and memory[0]
; ─────────────────────────────────────
START:
    CLB
    LDM 9       ; ACC = 9
    XCH R0      ; R0 = 9
    LDM 4       ; ACC = 4
    XCH R2      ; R2 = 4
    LD  R0      ; ACC = 9
    SUB R2      ; ACC = 9 - 4 = 5   CY = borrow
    XCH R1      ; R1 = 5
    WRM 0       ; memory[0] = 5
    HLT`,

mul:`; ─────────────────────────────────────
; MULTIPLICATION:  3 × 4 = 12
; Low nibble  → ACC  and memory[0]
; High nibble → R15  and memory[1]
; (product > 15 overflows to R15)
; ─────────────────────────────────────
START:
    CLB
    LDM 3       ; ACC = 3
    XCH R0      ; R0 = 3
    LDM 4       ; ACC = 4
    MUL R0      ; ACC = (4×3) & 0xF = 12
                ; R15 = high nibble = 0
    WRM 0       ; memory[0] = low nibble
    LD  R15
    WRM 1       ; memory[1] = high nibble
    HLT`,

div:`; ─────────────────────────────────────
; DIVISION:  12 ÷ 3
; Quotient  → ACC  and memory[0]
; Remainder → R14  and memory[1]
; ─────────────────────────────────────
START:
    CLB
    LDM 3       ; divisor
    XCH R0      ; R0 = 3
    LDM 12      ; ACC = 12  (0xC fits in 4 bits)
    DIV R0      ; ACC = 4   R14 = 0 (no remainder)
    WRM 0       ; memory[0] = quotient
    LD  R14
    WRM 1       ; memory[1] = remainder
    HLT`,

bitops:`; ─────────────────────────────────────
; BITWISE OPERATIONS  (4-bit values)
; AND · OR · XOR
; ─────────────────────────────────────
    CLB

; AND:  1100 & 1010 = 1000  (12 & 10 = 8)
    LDM 12      ; ACC = 1100
    XCH R0      ; R0 = 1100
    LDM 10      ; ACC = 1010
    AND R0      ; ACC = 1000 = 8
    WRM 0       ; memory[0] = 8

; OR:   1100 | 1010 = 1110  (12 | 10 = 14)
    LDM 12      ; ACC = 1100
    XCH R1
    LDM 10      ; ACC = 1010
    OR  R1      ; ACC = 1110 = 14
    WRM 1       ; memory[1] = 14

; XOR:  1100 ^ 1010 = 0110  (12 ^ 10 = 6)
    LDM 12      ; ACC = 1100
    XCH R2
    LDM 10      ; ACC = 1010
    XOR R2      ; ACC = 0110 = 6
    WRM 2       ; memory[2] = 6

    HLT`,

shift:`; ─────────────────────────────────────
; BIT SHIFTING DEMO
; SHL / SHR  — logical shift
; RAL / RAR  — rotate through carry
; ─────────────────────────────────────
    CLB

; SHL:  0001 << 1 = 0010  (1 → 2)
    LDM 1
    SHL         ; ACC = 2   CY = 0
    WRM 0

; SHL:  0010 << 1 = 0100  (2 → 4)
    SHL         ; ACC = 4
    WRM 1

; SHL:  0100 << 1 = 1000  (4 → 8)
    SHL         ; ACC = 8
    WRM 2

; SHR:  1100 >> 1 = 0110  (12 → 6)
    LDM 12
    SHR         ; ACC = 6   CY = 0 (shifted out bit)
    WRM 3

; RAL:  rotate left — CY feeds into LSB
;  ACC=1001  CY=0 → ACC=0010  CY=1
    CLC
    LDM 9       ; ACC = 1001
    RAL         ; ACC = 0010  CY = 1
    WRM 4

; RAR:  rotate right — CY feeds into MSB
;  ACC=0110  CY=1 → ACC=1011  CY=0
    LDM 6       ; ACC = 0110  (CY still 1 from RAL)
    RAR         ; ACC = 1011  CY = 0
    WRM 5

    HLT`,

nand:`; ─────────────────────────────────────
; NAND / XAND  (functionally complete)
; Build NOT and AND from NAND alone
; ─────────────────────────────────────
    CLB

; NAND:  ~(1111 & 1010) = ~1010 = 0101  (15,10 → 5)
    LDM 15      ; A = 1111
    XCH R0
    LDM 10      ; B = 1010
    XAND R0     ; ACC = 0101 = 5
    WRM 0       ; memory[0] = 5

; NOT from NAND:  NOT A = NAND(A,A)
;  NOT 1100 = 0011  (12 → 3)
    LDM 12      ; A = 1100
    XCH R0
    LD  R0      ; ACC = A
    XAND R0     ; NAND(A,A) = NOT A = 0011 = 3
    WRM 1       ; memory[1] = 3

; AND from NAND:  AND(A,B) = NAND(NAND(A,B),NAND(A,B))
;  1100 & 1010 = 1000  (12 & 10 = 8)
    LDM 12      ; A = 1100
    XCH R0
    LDM 10      ; B = 1010
    XAND R0     ; t = NAND(A,B) = 0111
    XCH R1      ; R1 = t
    LD  R1
    XAND R1     ; NAND(t,t) = NOT t = 1000 = 8
    WRM 2       ; memory[2] = 8 ← AND result

    HLT`,

loop:`; ─────────────────────────────────────
; LOOP:  count 1 to 5, write to memory
; Uses ISZ  (increment and skip if zero)
; ─────────────────────────────────────
; R0 = counter (starts at 0)
; We count using INC and compare

    CLB
    LDM 0
    XCH R0      ; R0 = 0  (loop counter)
    LDM 0
    XCH R1      ; R1 = 0  (memory index)

LOOP:
    INC R0      ; R0++
    LD  R0
    WRM 0       ; write current count to mem[0]
    ; Store count in successive locations using ISZ trick
    LD  R0
    XCH R2      ; save R0
    ; Check if R0 == 5
    LDM 5
    XCH R3
    LD  R2
    SUB R3      ; ACC = R0 - 5
    LD  R2
    XCH R0      ; restore R0
    JCN 2, LOOP ; jump back if ACC != 0  (not yet 5)
    ; Store final count in memory
    LD  R0
    WRM 0       ; memory[0] = 5
    HLT`,

fib:`; ─────────────────────────────────────
; FIBONACCI SEQUENCE  (mod 16)
; 0, 1, 1, 2, 3, 5, 8, 13 ...
; Stores 8 terms in memory[0..7]
; ─────────────────────────────────────
    CLB
    LDM 0
    XCH R0      ; R0 = F(n-2) = 0
    LDM 1
    XCH R1      ; R1 = F(n-1) = 1
    LDM 0
    WRM 0       ; memory[0] = 0
    LDM 1
    WRM 1       ; memory[1] = 1
    ; Store at mem[2] onwards
    LDM 2
    XCH R2      ; R2 = address counter (start at 2)
    LDM 6
    XCH R3      ; R3 = remaining iterations (6 more terms)

FIB:
    CLB
    LD  R0
    ADD R1      ; ACC = F(n-2)+F(n-1)   CY possible
    XCH R4      ; R4 = next fib term
    LD  R1
    XCH R0      ; R0 = old R1
    LD  R4
    XCH R1      ; R1 = new fib term
    ; Write to memory[R2] — simplified to sequential WRM
    WRM 2       ; This demo writes to fixed mem[2] due to 4-bit addressing
    INC R2
    ; Decrement remaining count and loop
    ISZ R3, FIB ; R3++; jump if R3 != 0  (counts 0→1→2→...→0=done)
    HLT`
};

document.getElementById('ex-sel').addEventListener('change',function(){
  if(this.value&&EX[this.value]){
    document.getElementById('code').value=EX[this.value];
    updLnums();this.value='';
  }
});


function buildRegs(){
  const g=document.getElementById('regs');g.innerHTML='';
  for(let i=0;i<16;i++){
    const d=document.createElement('div');d.className='row';
    d.innerHTML=`<span class="rname" style="font-size:.6rem">R${String(i).padStart(2,'0')}</span>
      <span class="rval" id="rv${i}" style="font-size:.85rem">0</span>`;
    g.appendChild(d);
  }
}
function buildMem(){
  const g=document.getElementById('mem-grid');g.innerHTML='';
  for(let i=0;i<32;i++){
    const d=document.createElement('div');d.className='mc';
    d.id=`mc${i}`;d.title=`addr ${i}`;d.textContent='0';g.appendChild(d);
  }
}
function buildRef(){
  const items=[
    ['LDM n','ACC ← n (0–15)'],
    ['LD Rr','ACC ← Rr'],
    ['XCH Rr','swap ACC, Rr'],
    ['ADD Rr','ACC += Rr + CY'],
    ['SUB Rr','ACC -= Rr'],
    ['INC Rr','Rr++'],
    ['IAC','ACC++'],
    ['DAC','ACC--'],
    ['MUL Rr','ACC *= Rr  hi→R15'],
    ['DIV Rr','ACC /= Rr  rem→R14'],
    ['CLC','CY = 0'],
    ['STC','CY = 1'],
    ['CMC','CY = ~CY'],
    ['CMA','ACC = ~ACC'],
    ['CLB','ACC = CY = 0'],
    ['TCC','ACC = CY; CY = 0'],
    ['RAL','rotate ACC left/CY'],
    ['RAR','rotate ACC right/CY'],
    ['SHL','ACC << 1  MSB→CY'],
    ['SHR','ACC >> 1  LSB→CY'],
    ['AND Rr','ACC &= Rr'],
    ['OR Rr','ACC |= Rr'],
    ['XOR Rr','ACC ^= Rr'],
    ['XAND Rr','NAND: ~(ACC & Rr)'],
    ['WRM n','mem[n] = ACC'],
    ['RDM n','ACC = mem[n]'],
    ['JUN L','jump to label L'],
    ['JMS L','call subroutine L'],
    ['BBL n','return, ACC = n'],
    ['JCN c,L','jump: 1=ifZR 2=ifNZ 3=ifCY 4=ifNC'],
    ['JCC L','jump if CY = 0'],
    ['JCS L','jump if CY = 1'],
    ['ISZ Rr,L','Rr++; jump if ≠ 0'],
    ['DAA','decimal adjust ACC'],
    ['NOP','no operation'],
    ['HLT','halt processor'],
  ];
  const g=document.getElementById('ref-table');g.innerHTML='';
  items.forEach(([op,desc])=>{
    const d=document.createElement('div');
    d.innerHTML=`<span>${op}</span>${desc}`;
    g.appendChild(d);
  });
}

window.addEventListener('load',()=>{
  buildRegs();buildMem();buildRef();
  updLnums();updateUI();
  log('INTEL 4004 SIMULATOR READY','le-i');
  log('SELECT AN EXAMPLE OR WRITE ASSEMBLY CODE','le-i');
  log('PRESS  [LOAD]  THEN  [STEP]  OR  [RUN]','le-i');
});
